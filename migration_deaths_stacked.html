<style>
.mmp-wrap{padding:1rem 0.5rem 1.5rem;box-sizing:border-box;width:100%;}
.mmp-legend{display:flex;gap:16px;flex-wrap:wrap;margin:0 0 0.75rem 38px;}
.mmp-li{display:flex;align-items:center;gap:6px;font-size:18px;color:#444;}
.mmp-sw{width:12px;height:10px;border-radius:2px;flex-shrink:0;}
.mmp-sw-u{position:relative;width:18px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mmp-sw-u::before{content:'';position:absolute;left:0;right:0;height:1.5px;background:#FF671F;top:50%;transform:translateY(-50%);}
.mmp-sw-u::after{content:'';position:absolute;top:0;bottom:0;width:1.5px;background:#FF671F;left:50%;transform:translateX(-50%);}
.mmp-row{display:flex;align-items:stretch;}
.mmp-axlabel{width:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mmp-axlabel span{font-size:16px;color:#0033A0;writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;line-height:1.3;text-align:center;}
.mmp-canwrap{position:relative;flex:1;min-width:0;}
.mmp-foot{margin-top:0.5rem;font-size:11px;color:#888;border-top:0.5px solid #ddd;padding-top:0.5rem;}
</style>

<div class="mmp-wrap">
  <div class="mmp-legend">
    <span class="mmp-li"><span class="mmp-sw" style="background:#0033A0;"></span>Dead or missing</span>
    <span class="mmp-li"><span class="mmp-sw" style="background:rgba(128,153,208,0.65);"></span>Affected households</span>
    <span class="mmp-li">
      <span style="display:inline-flex;align-items:center;gap:0;flex-shrink:0;width:18px;height:14px;position:relative;">
        <span style="position:absolute;left:0;right:0;height:1.5px;background:#FF671F;top:50%;transform:translateY(-50%);border-radius:1px;"></span>
        <span style="position:absolute;left:1px;width:1.5px;top:0;bottom:0;background:#FF671F;border-radius:1px;"></span>
        <span style="position:absolute;right:1px;width:1.5px;top:0;bottom:0;background:#FF671F;border-radius:1px;"></span>
      </span>
      <span style="font-size:12px;color:#444;margin-left:4px;">Uncertainty (±)</span>
    </span>
  </div>

  <div class="mmp-row">
    <div class="mmp-axlabel"><span>Dead or missing</span></div>
    <div class="mmp-canwrap" style="height:clamp(75px,13vw,115px);">
      <canvas id="topChart" role="img" aria-label="Dead or missing persons by country, bars extend upward"></canvas>
    </div>
  </div>

  <div class="mmp-row" style="margin-top:-1px;">
    <div class="mmp-axlabel"><span>Affected households</span></div>
    <div class="mmp-canwrap" style="height:clamp(280px,50vw,440px);">
      <canvas id="botChart" role="img" aria-label="Affected households by country, bars extend downward with orange uncertainty lines"></canvas>
    </div>
  </div>

  <p class="mmp-foot">Orange lines show estimated uncertainty (±) around total household counts. Sorted by total household impact.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const raw = [
  { country:'Afghanistan', dead:5910, household:42020, unc:6797 },
  { country:'Myanmar',     dead:4582, household:15304, unc:1558 },
  { country:'Ethiopia',    dead:2702, household:10241, unc:1513 },
  { country:'Syria',       dead:1472, household:6756,  unc:1133 },
  { country:'Senegal',     dead:682,  household:5060,  unc:757  },
  { country:'Algeria',     dead:1238, household:4878,  unc:569  },
  { country:'Mexico',      dead:1764, household:4833,  unc:388  },
  { country:'Morocco',     dead:1036, household:3709,  unc:1927 },
  { country:'Pakistan',    dead:585,  household:3364,  unc:486  },
  { country:'Guatemala',   dead:808,  household:3119,  unc:364  },
  { country:'Venezuela',   dead:821,  household:2750,  unc:189  },
].sort((a,b) => b.household - a.household);

const YAXIS_W = 50;
const gridColor = 'rgba(0,0,0,0.06)';

const tooltipBase = {
  backgroundColor:'rgba(255,255,255,0.97)',
  titleColor:'#111', bodyColor:'#555',
  borderColor:'rgba(0,0,0,0.1)', borderWidth:1,
  padding:10, cornerRadius:7,
};

/* TOP CHART */
new Chart(document.getElementById('topChart'), {
  type:'bar',
  data:{
    labels: raw.map(d=>d.country),
    datasets:[{
      data: raw.map(d=>d.dead),
      backgroundColor:'#0033A0',
      borderWidth:0,
      borderRadius:{topLeft:3,topRight:3,bottomLeft:0,bottomRight:0},
      borderSkipped:false,
    }]
  },
  options:{
    responsive:true, maintainAspectRatio:false,
    layout:{padding:{right:20,bottom:0,top:4}},
    scales:{
      x:{ display:false },
      y:{
        min:0,
        suggestedMax: Math.max(...raw.map(d=>d.dead))*1.3,
        grid:{color:gridColor},
        border:{display:false},
        ticks:{
          color:'#999', font:{size:10}, maxTicksLimit:3,
          callback: v => v>=1000 ? (v/1000).toFixed(0)+'k' : v
        },
        afterFit(s){s.width=YAXIS_W;}
      }
    },
    plugins:{
      legend:{display:false},
      tooltip:{
        ...tooltipBase,
        callbacks:{
          title: items => items[0].label,
          label: item => ` Dead or missing: ${raw[item.dataIndex].dead.toLocaleString()}`
        }
      }
    }
  }
});

/* UNCERTAINTY PLUGIN — vertical line with horizontal caps */
const uncPlugin = {
  id:'unc',
  afterDatasetsDraw(chart){
    const {ctx, scales:{y}} = chart;
    ctx.save();
    ctx.strokeStyle = '#FF671F';
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    raw.forEach((d,i) => {
      const bar = chart.getDatasetMeta(0).data[i];
      if(!bar) return;
      const xPos = bar.x;
      const cap  = Math.min(bar.width * 0.35, 8);
      const yHi  = y.getPixelForValue(-(d.household - d.unc));
      const yLo  = y.getPixelForValue(-(d.household + d.unc));
      ctx.beginPath(); ctx.moveTo(xPos, yHi); ctx.lineTo(xPos, yLo); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(xPos-cap, yHi); ctx.lineTo(xPos+cap, yHi); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(xPos-cap, yLo); ctx.lineTo(xPos+cap, yLo); ctx.stroke();
    });
    ctx.restore();
  }
};
Chart.register(uncPlugin);

/* BOTTOM CHART */
new Chart(document.getElementById('botChart'), {
  type:'bar',
  data:{
    labels: raw.map(d=>d.country),
    datasets:[{
      data: raw.map(d=>-d.household),
      backgroundColor:'rgba(128,153,208,0.65)',
      borderWidth:0,
      borderRadius:{topLeft:0,topRight:0,bottomLeft:3,bottomRight:3},
      borderSkipped:false,
    }]
  },
  options:{
    responsive:true, maintainAspectRatio:false,
    layout:{padding:{right:20,top:0}},
    scales:{
      x:{
        grid:{display:false},
        border:{display:false},
        ticks:{
          color:'#222', font:{size:14}, //Countries font
          maxRotation:0, minRotation:0,
        }
      },
      y:{
        max:0,
        suggestedMin: -Math.max(...raw.map(d=>d.household))*1.07,
        grid:{color:gridColor},
        border:{display:false},
        ticks:{
          color:'#999', font:{size:10}, maxTicksLimit:5,
          callback: v => { const a=Math.abs(v); return a>=1000?(a/1000).toFixed(0)+'k':a; }
        },
        afterFit(s){s.width=YAXIS_W;}
      }
    },
    plugins:{
      legend:{display:false},
      tooltip:{
        ...tooltipBase,
        callbacks:{
          title: items => items[0].label,
          label: item => {
            const d=raw[item.dataIndex];
            return ` Households: ${d.household.toLocaleString()} (±${d.unc.toLocaleString()})`;
          },
          afterBody: items => {
            const d=raw[items[0].dataIndex];
            return ['',` ~${(d.household/d.dead).toFixed(1)}× household multiplier`];
          }
        }
      }
    }
  }
});
</script>
